<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="#0f172a"/>

  <!-- Signal arc lines (RF theme) -->
  <g fill="none" stroke="#3b82f6" stroke-linecap="round">
    <path stroke-width="18" stroke-opacity="0.35" d="M 130 310 A 148 148 0 0 1 382 310"/>
    <path stroke-width="18" stroke-opacity="0.55" d="M 168 310 A 110 110 0 0 1 344 310"/>
    <path stroke-width="18" stroke-opacity="0.80" d="M 206 310 A  72  72 0 0 1 306 310"/>
  </g>

  <!-- Center dot (antenna node) -->
  <circle cx="256" cy="310" r="18" fill="#3b82f6"/>

  <!-- TRACS text -->
  <text
    x="256" y="210"
    font-family="'Segoe UI', Arial, sans-serif"
    font-size="100"
    font-weight="700"
    fill="#ffffff"
    text-anchor="middle"
    letter-spacing="4"
  >TRACS</text>

  <!-- V2 badge -->
  <rect x="188" y="340" width="136" height="50" rx="10" fill="#3b82f6"/>
  <text
    x="256" y="378"
    font-family="'Segoe UI', Arial, sans-serif"
    font-size="38"
    font-weight="700"
    fill="#ffffff"
    text-anchor="middle"
    letter-spacing="2"
  >v2</text>
</svg>
