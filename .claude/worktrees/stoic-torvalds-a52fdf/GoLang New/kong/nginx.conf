worker_processes  1;

events {
    worker_connections  1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    upstream tm_gateway {
        server 127.0.0.1:21000;
    }

    upstream tm_simulator {
        server 127.0.0.1:21001;
    }

    upstream tm_umacs_tc {
        server 127.0.0.1:21002;
    }

    upstream tm_umacs_emulator {
        server 127.0.0.1:21003;
    }

    upstream iam {
        server 127.0.0.1:21005;
    }

    upstream nats_ws {
        server 127.0.0.1:4223;
    }

    # Optional legacy MQTT websocket upstream retained for compatibility.
    # upstream mqtt_ws {
    #     server 127.0.0.1:8083;
    # }

    server {
        listen 80;
        server_name localhost;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Equivalent to Kong: /gateway -> http://host.docker.internal:21000 with strip_path=true
        location /gateway/ {
            rewrite ^/gateway/?(.*)$ /$1 break;
            proxy_pass http://tm_gateway;
        }

        location = /gateway {
            rewrite ^ / break;
            proxy_pass http://tm_gateway;
        }

        # Equivalent to Kong: /simulator -> :21001 with strip_path=true
        location /simulator/ {
            rewrite ^/simulator/?(.*)$ /$1 break;
            proxy_pass http://tm_simulator;
        }

        location = /simulator {
            rewrite ^ / break;
            proxy_pass http://tm_simulator;
        }

        # Equivalent to Kong: /umacs-tc -> :21002 with strip_path=true
        location /umacs-tc/ {
            rewrite ^/umacs-tc/?(.*)$ /$1 break;
            proxy_pass http://tm_umacs_tc;
        }

        location = /umacs-tc {
            rewrite ^ / break;
            proxy_pass http://tm_umacs_tc;
        }

        # Equivalent to Kong: /umacs-emulator -> :21003 with strip_path=true
        location /umacs-emulator/ {
            rewrite ^/umacs-emulator/?(.*)$ /$1 break;
            proxy_pass http://tm_umacs_emulator;
        }

        location = /umacs-emulator {
            rewrite ^ / break;
            proxy_pass http://tm_umacs_emulator;
        }

        # IAM API route for frontend callers using /iam/api/v1/iam/... style.
        # Example: /iam/api/v1/iam/auth/login -> /iam/auth/login
        location /iam/api/v1/iam/ {
            rewrite ^/iam/api/v1/(.*)$ /$1 break;
            proxy_pass http://iam;
        }

        # IAM API route for frontend callers using /iam/api/v1/... style.
        # Example: /iam/api/v1/auth/login -> /iam/auth/login
        location /iam/api/v1/ {
            rewrite ^/iam/api/v1/?(.*)$ /iam/$1 break;
            proxy_pass http://iam;
        }

        # New NATS websocket route for browser clients.
        # Browser endpoint becomes: ws://localhost/nats
        location /nats {
            proxy_pass http://nats_ws;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        location /nats/ {
            proxy_pass http://nats_ws;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # Optional legacy MQTT websocket route matching current Kong behavior.
        # location /mqtt {
        #     proxy_pass http://mqtt_ws;
        #     proxy_set_header Upgrade $http_upgrade;
        #     proxy_set_header Connection $connection_upgrade;
        #     proxy_read_timeout 3600s;
        #     proxy_send_timeout 3600s;
        # }
        #
        # location /mqtt/ {
        #     proxy_pass http://mqtt_ws;
        #     proxy_set_header Upgrade $http_upgrade;
        #     proxy_set_header Connection $connection_upgrade;
        #     proxy_read_timeout 3600s;
        #     proxy_send_timeout 3600s;
        # }
    }
}
